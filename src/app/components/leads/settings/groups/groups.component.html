<ng-container *fsSkeleton="groupsLoaded">
  <div class="groups-header">
    <button
        mat-flat-button
        color="primary"
        type="button"
        (click)="add()">
      <mat-icon>add</mat-icon>
      Create group
    </button>
  </div>

  @if (formModel.name !== undefined) {
    <div class="group-form">
      <fs-label-field>
        <fs-label>Name</fs-label>
        <input
            type="text"
            [(ngModel)]="formModel.name"
            name="groupName"
            placeholder="Group name" />
      </fs-label-field>
      <fs-label-field>
        <fs-label>Color</fs-label>
        <input
            type="text"
            [(ngModel)]="formModel.color"
            name="groupColor"
            placeholder="e.g. #ff0000 or color name" />
      </fs-label-field>
      <div class="form-actions">
        <button
            mat-button
            type="button"
            (click)="save()"
            [disabled]="!formModel.name?.trim()">
          {{ editing ? 'Update' : 'Add' }}
        </button>
        <button
            mat-button
            type="button"
            (click)="cancel()">
          Cancel
        </button>
      </div>
    </div>
  }

  <ul class="groups-list">
    @for (group of groups; track group.id) {
      <li class="group-row">
        <fs-chip
            [size]="'small'"
            [backgroundColor]="group.color">
          {{ group.name }}
        </fs-chip>
        <div class="group-actions">
          <button
              mat-icon-button
              type="button"
              (click)="edit(group)"
              aria-label="Edit group">
            <mat-icon>edit</mat-icon>
          </button>
          <button
              mat-icon-button
              type="button"
              (click)="deleteGroup(group)"
              aria-label="Delete group">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </li>
    }
  </ul>
  @if (groups.length === 0 && !formModel.name) {
    <p class="empty">No groups yet. Create one to assign leads to groups.</p>
  }
</ng-container>
